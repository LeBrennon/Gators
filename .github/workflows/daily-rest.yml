name: Daily pitchers' rest chart

# Emails the Gumbeaux Gators pitchers' rest chart to the report recipients every
# day at noon Central. It boots the app, prints the /rest page to a mobile one-page
# PDF (scripts/rest-chart.js), and emails it (scripts/email-report.js) — the same
# personal-delivery path the post-game workflow uses. Nothing is committed; the
# chart is also uploaded as a build artifact.
#
# GitHub cron is UTC only, so to land on noon Central through DST we schedule both
# 17:00 UTC (noon CDT) and 18:00 UTC (noon CST) and gate the job to the run where
# America/Chicago is actually at 12:00 — so exactly one fires each day.

on:
  schedule:
    - cron: '0 17 * * *'   # noon CDT (summer)
    - cron: '0 18 * * *'   # noon CST (winter)
  workflow_dispatch:        # manual "send it now" from the Actions tab

concurrency:
  group: daily-rest
  cancel-in-progress: false

jobs:
  rest:
    runs-on: ubuntu-latest
    steps:
      - name: Only proceed at noon Central (skip the off-DST cron)
        id: gate
        run: |
          H="$(TZ=America/Chicago date +%H)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$H" = "12" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "America/Chicago hour is $H, not noon — skipping this run."
          fi

      - name: Checkout
        if: steps.gate.outputs.go == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.gate.outputs.go == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        if: steps.gate.outputs.go == 'true'
        run: npm ci

      - name: Build the pitchers' rest chart PDF
        id: restchart
        if: steps.gate.outputs.go == 'true'
        run: |
          export CHROMIUM_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          PDF="$(node scripts/rest-chart.js)"
          echo "built pitchers' rest chart: $PDF"
          echo "pdf=$PDF" >> "$GITHUB_OUTPUT"

      - name: Upload the rest chart artifact
        if: steps.restchart.outputs.pdf != ''
        uses: actions/upload-artifact@v4
        with:
          name: gators-pitchers-rest
          path: reports/rest/
          if-no-files-found: warn
          retention-days: 90

      - name: Is email configured?
        id: mail
        if: steps.restchart.outputs.pdf != ''
        env:
          PW: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ -n "$PW" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"; else echo "enabled=false" >> "$GITHUB_OUTPUT"; echo "GMAIL_APP_PASSWORD not set — chart uploaded as an artifact only."; fi

      - name: Email the pitchers' rest chart
        if: steps.restchart.outputs.pdf != '' && steps.mail.outputs.enabled == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          REPORT_SUBJECT: "Gators Pitchers' Rest Chart"
          REPORT_BODY: "Today's Gumbeaux Gators pitchers' rest chart is attached (pitches thrown + days of rest, current roster)."
        run: node scripts/email-report.js "${{ steps.restchart.outputs.pdf }}"
