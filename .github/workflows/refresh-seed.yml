name: Refresh seed + post-game report

# Runs three ways:
#   • schedule (daily 07:00 UTC ≈ 2am Central) — rebuild + commit the warm-boot
#     seed (roster-seed.json) and upload a fresh report artifact. No email.
#   • repository_dispatch (type: gators-final) — fired by the live server within
#     seconds of the last out. Builds the branded post-game report, the full
#     one-page BOX SCORE, and the GM cards for the just-finished game and EMAILS
#     them to the recipients. The "as soon as the last out" path.
#   • workflow_dispatch — manual run from the Actions tab (also emails), optionally
#     for a specific box id.
#
# The report is a PERSONAL artifact — reports/postgame/ is gitignored, so it ships
# as a build artifact and by email; it is never committed and never on the website.

on:
  schedule:
    - cron: '0 7 * * *'
  repository_dispatch:
    types: [gators-final]
  workflow_dispatch:
    inputs:
      game_id:
        description: 'Box id (YYYYMMDD_xxxx) to report; blank = latest final'
        required: false
        default: ''
      dry_run:
        description: 'Build the report and upload the artifact only — do NOT email'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: refresh-seed
  cancel-in-progress: false   # let a game-final build finish even if the cron overlaps

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve target game + whether to email
        id: plan
        run: |
          GID="${{ github.event.client_payload.id }}"
          [ -z "$GID" ] && GID="${{ github.event.inputs.game_id }}"
          echo "game_id=$GID" >> "$GITHUB_OUTPUT"
          # Scheduled runs refresh the seed but don't email (avoids a 2am duplicate
          # of the instant game-final email); a manual dry_run also skips email;
          # dispatch and normal manual runs email.
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "email=false" >> "$GITHUB_OUTPUT"
          else
            echo "email=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild seed from the live deploy
        run: node scripts/build-seed.js || true

      - name: Commit the refreshed seed (scheduled run only)
        if: github.event_name == 'schedule'
        run: |
          if git diff --quiet -- roster-seed.json; then
            echo "roster-seed.json unchanged — nothing to commit"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add roster-seed.json
            git commit -m "Auto-refresh roster-seed.json"
            git push
          fi

      - name: Build the post-game report (waits for stats to post)
        id: build
        env:
          # Also emit the data block the branded GM report cards render from.
          CARD_DATA_OUT: reports/postgame/card-data.json
        run: |
          export CHROMIUM_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          TARGET="${{ steps.plan.outputs.game_id }}"; [ -z "$TARGET" ] && TARGET="latest"
          echo "target=$TARGET  chromium=${CHROMIUM_PATH:-<none, will fall back>}"
          for i in 1 2 3 4 5 6; do
            if node scripts/postgame-report.js "$TARGET" --pdf --write --strict; then
              echo "built=true" >> "$GITHUB_OUTPUT"; exit 0
            fi
            echo "  '$TARGET' has no pitching data yet (unposted or rate-limited) — waiting 120s, then rebuilding ($i/6)"
            sleep 120
            node scripts/build-seed.js || true
          done
          echo "built=false" >> "$GITHUB_OUTPUT"
          echo "::error::could not build a report for '$TARGET' (stats never posted in time)"
          exit 1

      - name: Preview report in the log (dry run only)
        if: steps.build.outputs.built == 'true' && github.event.inputs.dry_run == 'true'
        run: |
          echo "----- REPORT MARKDOWN PREVIEW BEGIN -----"
          cat reports/postgame/*.md
          echo "----- REPORT MARKDOWN PREVIEW END -----"

      - name: Upload the report artifact
        if: steps.build.outputs.built == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gators-postgame-report
          path: reports/postgame/
          if-no-files-found: warn
          retention-days: 90

      - name: Is email configured?
        id: mail
        env:
          PW: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ -n "$PW" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"; else echo "enabled=false" >> "$GITHUB_OUTPUT"; fi

      - name: Install deps for emailing
        if: steps.build.outputs.built == 'true' && steps.plan.outputs.email == 'true' && steps.mail.outputs.enabled == 'true'
        run: npm ci

      - name: Email the report to recipients
        if: steps.build.outputs.built == 'true' && steps.plan.outputs.email == 'true' && steps.mail.outputs.enabled == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: node scripts/email-report.js

      # ----- Full box score PDF (personal delivery; nothing on the website) -------
      # The branded one-page box score, built + emailed on the game-final / manual
      # email paths. Independent of the post-game report so a slow box never blocks
      # it. --strict fails until Presto renders the finished box (line score in), so
      # the retry loop waits out the post-final gate lag before sending.
      - name: Build the box-score PDF (waits for the finished box to render)
        id: box
        if: ${{ always() && steps.plan.outputs.email == 'true' }}
        continue-on-error: true
        run: |
          npm ci
          export CHROMIUM_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          TARGET="${{ steps.plan.outputs.game_id }}"; [ -z "$TARGET" ] && TARGET="tonight"
          # Poll tightly (every 15s) so the email fires within seconds of the box
          # becoming available, not up to a couple minutes later. The live server
          # pre-warms the box cache (warmFinalBox) the instant the game is final, so
          # the first attempt often already succeeds; the window stays generous
          # (~10 min) for the occasional slow Presto render.
          for i in $(seq 1 40); do
            if node scripts/box-score.js "$TARGET" --pdf --strict; then
              PDF="$(ls -t reports/box/*.pdf | head -1)"
              echo "pdf=$PDF" >> "$GITHUB_OUTPUT"
              echo "built the box score on attempt $i: $PDF"
              exit 0
            fi
            echo "  box for '$TARGET' isn't fully rendered yet — retrying in 15s ($i/40)"
            sleep 15
          done
          echo "::warning::box score for '$TARGET' never fully rendered in time"

      - name: Upload the box-score artifact
        if: ${{ always() && steps.box.outputs.pdf != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: gators-box-score
          path: reports/box/
          if-no-files-found: warn
          retention-days: 90

      - name: Email the box score
        if: ${{ always() && steps.box.outputs.pdf != '' && steps.mail.outputs.enabled == 'true' }}
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          REPORT_SUBJECT: "Gators Box Score"
          REPORT_BODY: "The full one-page box score for tonight's game is attached."
        run: node scripts/email-report.js "${{ steps.box.outputs.pdf }}"

      # ----- Branded GM report cards (Computer + Mobile; personal delivery) -------
      # Rendered from the data block the post-game build emitted (card-data.json),
      # so the shareable cards carry the same numbers + narrative as the report.
      # Independent of the plain report email so a render hiccup never blocks it.
      - name: Build the branded GM report cards
        id: cards
        if: steps.build.outputs.built == 'true'
        continue-on-error: true
        run: |
          export CHROMIUM_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          node scripts/gm-report-cards.js --data reports/postgame/card-data.json
          echo "built=true" >> "$GITHUB_OUTPUT"

      - name: Upload the GM report cards artifact
        if: steps.cards.outputs.built == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gators-gm-report-cards
          path: reports/postgame/*gm-report*
          if-no-files-found: warn
          retention-days: 90

      - name: Email the GM report cards
        if: steps.cards.outputs.built == 'true' && steps.plan.outputs.email == 'true' && steps.mail.outputs.enabled == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          REPORT_SUBJECT: "Gators GM Report Cards"
          REPORT_BODY: "The branded GM report cards (computer + mobile) for the latest game are attached."
        run: |
          shopt -s nullglob
          mapfile -t CARDS < <(printf '%s\n' reports/postgame/*gm-report*\ \(Computer\).pdf reports/postgame/*gm-report*\ \(Mobile\).pdf)
          if [ ${#CARDS[@]} -eq 0 ]; then echo "no GM card PDFs found to email"; exit 0; fi
          node scripts/email-report.js "${CARDS[@]}"
