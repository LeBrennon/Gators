name: Refresh seed + post-game report

# Runs three ways:
#   • schedule (daily 07:00 UTC ≈ 2am Central) — rebuild + commit the warm-boot
#     seed (roster-seed.json) and upload fresh report artifacts. No email.
#   • repository_dispatch (type: gators-final) — fired by the live server within
#     seconds of the last out. Builds the branded FULL BOX SCORE for the just-
#     finished game (plus the narrative recap when it's ready) and EMAILS them to
#     the recipients. This is the "as soon as the last out is made" path.
#   • workflow_dispatch — manual run from the Actions tab (also emails), optionally
#     for a specific box id.
#
# The deliverables are PERSONAL artifacts — reports/box/ and reports/postgame/ are
# gitignored, so they ship as build artifacts and by email; never committed, never
# on the website.

on:
  schedule:
    - cron: '0 7 * * *'
  repository_dispatch:
    types: [gators-final]
  workflow_dispatch:
    inputs:
      game_id:
        description: 'Box id (YYYYMMDD_xxxx) to report; blank = latest final'
        required: false
        default: ''
      dry_run:
        description: 'Build the report and upload the artifact only — do NOT email'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: refresh-seed
  cancel-in-progress: false   # let a game-final build finish even if the cron overlaps

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve target game + whether to email
        id: plan
        run: |
          GID="${{ github.event.client_payload.id }}"
          [ -z "$GID" ] && GID="${{ github.event.inputs.game_id }}"
          echo "game_id=$GID" >> "$GITHUB_OUTPUT"
          # Scheduled runs refresh the seed but don't email (avoids a 2am duplicate
          # of the instant game-final email); a manual dry_run also skips email;
          # dispatch and normal manual runs email.
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "email=false" >> "$GITHUB_OUTPUT"
          else
            echo "email=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild seed from the live deploy
        run: node scripts/build-seed.js || true

      - name: Commit the refreshed seed (scheduled run only)
        if: github.event_name == 'schedule'
        run: |
          if git diff --quiet -- roster-seed.json; then
            echo "roster-seed.json unchanged — nothing to commit"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add roster-seed.json
            git commit -m "Auto-refresh roster-seed.json"
            git push
          fi

      - name: Build the full box score + post-game report (waits for stats to post)
        id: build
        run: |
          export CHROMIUM_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          TARGET="${{ steps.plan.outputs.game_id }}"; [ -z "$TARGET" ] && TARGET="latest"
          echo "target=$TARGET  chromium=${CHROMIUM_PATH:-<none, will fall back>}"
          for i in 1 2 3 4 5 6; do
            # The FULL BOX SCORE is the priority deliverable — gate the email on it
            # so it lands "as soon as the last out is made". It needs the box to be
            # posted (same stats the recap does), so it doubles as the "ready?" probe.
            if node scripts/box-score.js "$TARGET" --pdf; then
              # Box is posted, so the stats are in — build the narrative recap too,
              # best-effort: a flaky recap must never hold back the box-score email.
              node scripts/postgame-report.js "$TARGET" --pdf --write --strict \
                || echo "::warning::narrative post-game report not ready for '$TARGET' — sending the box score alone"
              echo "built=true" >> "$GITHUB_OUTPUT"; exit 0
            fi
            echo "  box score for '$TARGET' not posted yet (unposted or rate-limited) — waiting 120s, then rebuilding ($i/6)"
            sleep 120
            node scripts/build-seed.js || true
          done
          echo "built=false" >> "$GITHUB_OUTPUT"
          echo "::error::could not build a box score for '$TARGET' (stats never posted in time)"
          exit 1

      - name: Preview report in the log (dry run only)
        if: steps.build.outputs.built == 'true' && github.event.inputs.dry_run == 'true'
        run: |
          echo "----- BOX SCORE FILES -----"
          ls -la reports/box/ || echo "(no box files)"
          echo "----- REPORT MARKDOWN PREVIEW BEGIN -----"
          cat reports/postgame/*.md 2>/dev/null || echo "(no narrative report — box score only)"
          echo "----- REPORT MARKDOWN PREVIEW END -----"

      - name: Upload the report artifacts
        if: steps.build.outputs.built == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gators-postgame-report
          path: |
            reports/box/
            reports/postgame/
          if-no-files-found: warn
          retention-days: 90

      - name: Is email configured?
        id: mail
        env:
          PW: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ -n "$PW" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"; else echo "enabled=false" >> "$GITHUB_OUTPUT"; fi

      - name: Install deps for emailing
        if: steps.build.outputs.built == 'true' && steps.plan.outputs.email == 'true' && steps.mail.outputs.enabled == 'true'
        run: npm ci

      - name: Email the report to recipients
        if: steps.build.outputs.built == 'true' && steps.plan.outputs.email == 'true' && steps.mail.outputs.enabled == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: node scripts/email-report.js
